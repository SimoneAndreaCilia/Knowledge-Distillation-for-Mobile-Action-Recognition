# =============================================================================
# Knowledge Distillation — Temperature T=20 (Extreme Smoothing)
# =============================================================================
# T=20 approaches the limit where softmax outputs converge to a uniform
# distribution. At this extreme, the KD signal is very weak — most of the
# inter-class information is washed out. This serves as an upper bound
# for the temperature ablation to demonstrate diminishing returns.
#
# Usage:
#   python -m src.training.train_distill --config experiments/configs/distill_T20.yaml
# =============================================================================

experiment:
  name: "distilled_T20"
  seed: 42

teacher:
  teacher_checkpoint: "./checkpoints/teacher/best_model.pth"
  teacher_num_classes: 51

student:
  num_classes: 51
  width_mult: 1.0
  dropout: 0.2

distillation:
  temperature: 20.0
  alpha: 0.3
  use_attention_transfer: false
  at_beta: 1000.0
  use_hint_learning: false
  hint_beta: 0.5

data:
  dataset_type: "video"
  data_dir: "./data/hmdb51"
  annotation_dir: "./data/hmdb51_splits"
  split: 1
  num_frames: 16
  frame_size: 112
  batch_size: 16
  num_workers: 4

training:
  epochs: 100
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 5
  label_smoothing: 0.0

checkpoint:
  checkpoint_dir: "./checkpoints/distilled_T20"
  max_keep: 5
  resume: true

logging:
  log_dir: "./runs/distilled_T20"
  log_interval: 10

cluster:
  time_limit_hours: 12.0
  time_buffer_minutes: 15.0
