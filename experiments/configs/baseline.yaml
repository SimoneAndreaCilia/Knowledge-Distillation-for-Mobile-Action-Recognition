# =============================================================================
# Baseline Student Training Configuration
# =============================================================================
# Train the 3D MobileNet student model on HMDB-51 using standard
# Cross-Entropy loss. This establishes the lower-bound accuracy baseline.
#
# Usage:
#   python -m src.training.train_baseline --config experiments/configs/baseline.yaml
#
# CLI arguments override values in this file.
# =============================================================================

experiment:
  name: "baseline_student"
  seed: 42

data:
  dataset_type: "video"
  data_dir: "./data/hmdb51"                # Override via HMDB51_DATA_DIR env var
  annotation_dir: "./data/hmdb51_splits"   # Override via HMDB51_ANNO_DIR env var
  split: 1
  num_frames: 16
  frame_size: 112
  batch_size: 16
  num_workers: 4

model:
  model: "student"
  num_classes: 51
  width_mult: 1.0
  dropout: 0.2
  pretrained: false

training:
  epochs: 100
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 5
  label_smoothing: 0.0

checkpoint:
  checkpoint_dir: "./checkpoints/baseline"
  max_keep: 5
  resume: true

logging:
  log_dir: "./runs/baseline"
  log_interval: 10

cluster:
  time_limit_hours: 12.0
  time_buffer_minutes: 15.0
