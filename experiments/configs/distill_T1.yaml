# =============================================================================
# Knowledge Distillation — Temperature T=1 (Hard Softmax / Control)
# =============================================================================
# At T=1 the softmax is standard (no smoothing). The KL divergence mainly
# transfers the top-1 prediction confidence. Minimal inter-class structure
# is revealed. This serves as the "no temperature" control experiment.
#
# Teacher: Kinetics-400 pre-trained 3D ResNet-50 (frozen, ~62.94% on HMDB-51)
# Student: 3D MobileNet (trainable, ~2.2M params)
#
# Usage:
#   python -m src.training.train_distill --config experiments/configs/distill_T1.yaml
# =============================================================================

experiment:
  name: "distilled_T1"
  seed: 42

teacher:
  teacher_checkpoint: "./checkpoints/teacher/best_model.pth"
  teacher_num_classes: 51
  teacher_pretrained_source: "kinetics"

student:
  num_classes: 51
  width_mult: 1.0
  dropout: 0.5

distillation:
  temperature: 1.0           # No softening — standard softmax
  alpha: 0.3
  use_attention_transfer: false
  at_beta: 1000.0
  use_hint_learning: false
  hint_beta: 0.5

data:
  dataset_type: "video"
  data_dir: "./data/hmdb51"
  annotation_dir: "./data/hmdb51_splits"
  split: 1
  num_frames: 16
  frame_size: 112
  batch_size: 64
  num_workers: 4

training:
  epochs: 100
  lr: 0.02
  momentum: 0.9
  weight_decay: 0.001
  scheduler: "cosine"
  warmup_epochs: 10
  label_smoothing: 0.1

checkpoint:
  checkpoint_dir: "./checkpoints/distilled_T1"
  max_keep: 3
  resume: true

logging:
  log_dir: "./runs/03_kd_profs/distilled_T1"
  log_interval: 10

cluster:
  time_limit_hours: 12.0
  time_buffer_minutes: 15.0
